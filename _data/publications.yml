  conference: IEEE Symposium on Security and Privacy (IEEE S&amp;P), 2022
  link: <a href="https://ieeexplore.ieee.org/abstract/document/9833672" target="_blank">[IEEE S&amp;P 论文]</a> <a href="https://arxiv.org/abs/2112.05307" target="_blank">[arXiv 预印本]</a>
  comment: 利用时间和浮点侧信道，对差分隐私系统发起攻击。此研究获得 <a href="https://bughunters.google.com/profile/1e5f9da7-e8d5-42dc-be8b-cc576152232a" target="_blank">Google Bug Hunter</a> 提名；PyTorch 亦修复了文中提出的 <a href="https://github.com/pytorch/opacus/blob/main/opacus/optimizers/optimizer.py" target="_blank">Bug</a>。IEEE S&amp;P 为国际公认的四大安全顶会之一，中国计算机学会（CCF）A 类会议。

